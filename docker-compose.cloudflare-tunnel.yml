services:
  cloudflared:
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:2026.7.1@sha256:188bb03589a32affed3cf4d0590565ffe67b78866e6b5582574afab2b705bafe}
    container_name: relay-cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - type: bind
        source: ${CLOUDFLARED_CONFIG_PATH}
        target: /etc/cloudflared/config.yml
        read_only: true
      - type: bind
        source: ${CLOUDFLARED_CREDENTIALS_PATH}
        target: /etc/cloudflared/tunnel.json
        read_only: true
    networks:
      - relay-internal
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

networks:
  relay-internal:
    name: ${LIHAN_AI_NETWORK:-lihan_ai_relay-internal}
    external: true
