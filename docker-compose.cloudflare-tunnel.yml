services:
  cloudflared:
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:latest}
    container_name: relay-cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - type: bind
        source: ${CLOUDFLARED_CONFIG_PATH}
        target: /etc/cloudflared/config.yml
        read_only: true
      - type: bind
        source: ${CLOUDFLARED_CREDENTIALS_PATH}
        target: /etc/cloudflared/tunnel.json
        read_only: true
    networks:
      - lihan-ai-private
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

networks:
  lihan-ai-private:
    name: ${LIHAN_AI_NETWORK:-lihan-ai-private}
    external: true
