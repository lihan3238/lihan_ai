name: Post-merge validation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: post-merge-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runner-validation:
    name: post-merge validation
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Tool versions
        run: |
          bash --version | head -n 1
          docker --version
          docker compose version
          pwsh -NoLogo -NoProfile -Command '$PSVersionTable.PSVersion.ToString()'

      - name: Repository gate
        run: bash ops/dev-gate.sh

      - name: Runner compose smoke
        run: |
          set -eu
          compose_project="lihan-ai-ci-${GITHUB_RUN_ID}"
          docker compose -p "$compose_project" --env-file .env.example -f docker-compose.yml -f docker-compose.dev.yml up -d postgres redis new-api
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3100/api/status | grep -Eq '"success"[[:space:]]*:[[:space:]]*true'; then
              exit 0
            fi
            sleep 2
          done
          docker compose -p "$compose_project" --env-file .env.example -f docker-compose.yml -f docker-compose.dev.yml ps
          docker compose -p "$compose_project" --env-file .env.example -f docker-compose.yml -f docker-compose.dev.yml logs --tail=80 new-api
          exit 1

      - name: Cleanup runner compose smoke
        if: always()
        run: |
          compose_project="lihan-ai-ci-${GITHUB_RUN_ID}"
          docker compose -p "$compose_project" --env-file .env.example -f docker-compose.yml -f docker-compose.dev.yml down -v --remove-orphans
