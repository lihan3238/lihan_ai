<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lihan AI Quota</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --soft: #eef3f8;
      --text: #172033;
      --muted: #66738a;
      --line: #d9e0ea;
      --accent: #0f766e;
      --blue: #2563eb;
      --ok: #15803d;
      --warn: #b45309;
      --bad: #b42318;
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px 16px;
      background: transparent;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    .quota-only {
      width: min(760px, 100%);
    }

    .quota-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 14px 38px rgba(20, 32, 51, 0.08);
      overflow: hidden;
    }

    .quota-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .quota-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
      font-weight: 800;
    }

    .quota-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .pill {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .quota-body {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .provider {
      display: grid;
      gap: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 10px;
    }

    .provider-head,
    .account-head,
    .window-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .provider-title,
    .account-title {
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: 13px;
      font-weight: 800;
    }

    .accounts {
      display: grid;
      gap: 10px;
    }

    .account {
      display: grid;
      gap: 8px;
    }

    .status {
      flex: 0 0 auto;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .status.available { color: var(--ok); }
    .status.limited { color: var(--bad); }
    .status.unknown { color: var(--warn); }

    .windows {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
    }

    .window {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      padding: 9px;
      min-height: 104px;
    }

    .window-title {
      font-size: 12px;
      font-weight: 750;
    }

    .percent {
      margin-top: 8px;
      font-size: 20px;
      line-height: 1.1;
      font-weight: 850;
    }

    .bar {
      width: 100%;
      height: 8px;
      margin: 8px 0;
      border-radius: 999px;
      background: var(--soft);
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--blue));
    }

    .details {
      display: grid;
      gap: 2px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 16px;
      color: var(--muted);
      background: var(--panel);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 520px) {
      body {
        align-items: start;
        padding: 18px 10px;
      }

      .quota-head,
      .provider-head,
      .account-head {
        align-items: stretch;
        flex-direction: column;
      }

      .pill,
      .status {
        align-self: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="quota-only">
    <section class="quota-panel" aria-labelledby="quota-title">
      <div class="quota-head">
        <div>
          <h1 class="quota-title" id="quota-title">Lihan AI quota</h1>
          <div class="quota-meta" id="snapshot-meta">Loading quota snapshot...</div>
        </div>
        <div class="pill" id="snapshot-state">static</div>
      </div>
      <div class="quota-body" id="quota-root">
        <div class="empty">Loading quota snapshot...</div>
      </div>
    </section>
  </main>

  <script>
    const snapshotUrls = [
      new URL('data/quota-snapshot.json', window.location.href),
      new URL('data/codex-quota.json', window.location.href)
    ];
    const rootEl = document.getElementById('quota-root');
    const metaEl = document.getElementById('snapshot-meta');
    const stateEl = document.getElementById('snapshot-state');

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[char]));
    }

    function clampPercent(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return null;
      return Math.max(0, Math.min(100, number));
    }

    function formatPercent(value) {
      const number = clampPercent(value);
      if (number === null) return 'unknown';
      return `${number % 1 === 0 ? number.toFixed(0) : number.toFixed(1)}%`;
    }

    function formatTime(value) {
      if (!value) return 'unknown';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleString([], { month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function secondsUntil(value, fallback) {
      if (value) {
        const date = new Date(value);
        if (!Number.isNaN(date.getTime())) return Math.max(0, Math.floor((date.getTime() - Date.now()) / 1000));
      }
      const seconds = Number(fallback);
      return Number.isFinite(seconds) ? Math.max(0, Math.floor(seconds)) : null;
    }

    function formatDuration(seconds) {
      if (seconds === null) return 'unknown';
      if (seconds <= 0) return 'now';
      const days = Math.floor(seconds / 86400);
      const hours = Math.floor((seconds % 86400) / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      if (days > 0) return `${days}d ${hours}h`;
      if (hours > 0) return `${hours}h ${minutes}m`;
      return `${minutes}m`;
    }

    function statusClass(value) {
      const status = String(value || 'unknown').toLowerCase();
      if (status === 'available') return 'available';
      if (status === 'limited') return 'limited';
      return 'unknown';
    }

    function normalizeSnapshot(data) {
      if (Array.isArray(data.providers)) return data;
      const accounts = Array.isArray(data.accounts) ? data.accounts : [];
      return { ...data, providers: [{ provider: 'codex', title: 'Codex', accounts }] };
    }

    function windowList(account) {
      if (Array.isArray(account.windows)) return account.windows;
      if (account.windows && typeof account.windows === 'object') {
        return Object.entries(account.windows).map(([key, value]) => ({
          key,
          title: key.replace(/_/g, ' '),
          ...(value || {})
        }));
      }
      return [];
    }

    function detailLine(label, value) {
      return `<div><strong>${escapeHtml(label)}:</strong> ${escapeHtml(value)}</div>`;
    }

    function renderWindow(windowData) {
      const percent = clampPercent(windowData.used_percent);
      const resetSeconds = secondsUntil(windowData.reset_at, windowData.reset_after_seconds);
      const usedLimit = Number.isFinite(Number(windowData.used)) && Number.isFinite(Number(windowData.limit))
        ? `${windowData.used} / ${windowData.limit}`
        : windowData.remaining !== undefined ? `${windowData.remaining} remaining` : 'unknown';
      const width = percent === null ? 0 : percent;
      const status = windowData.status || (percent === null ? 'unknown' : 'tracked');

      return `
        <article class="window">
          <div class="window-title">
            <span>${escapeHtml(windowData.title || windowData.key || 'Window')}</span>
            <span class="status ${statusClass(status)}">${escapeHtml(status)}</span>
          </div>
          <div class="percent">${escapeHtml(formatPercent(windowData.used_percent))}</div>
          <div class="bar" aria-hidden="true"><span style="width:${width}%"></span></div>
          <div class="details">
            ${detailLine('Used', usedLimit)}
            ${detailLine('Reset', formatTime(windowData.reset_at))}
            ${detailLine('Countdown', formatDuration(resetSeconds))}
          </div>
        </article>
      `;
    }

    function renderAccount(account) {
      const plan = account.plan_type ? ` · ${account.plan_type}` : '';
      const windows = windowList(account);
      return `
        <article class="account">
          <div class="account-head">
            <div class="account-title">${escapeHtml(account.label || 'Account')}${escapeHtml(plan)}</div>
            <div class="status ${statusClass(account.status)}">${escapeHtml(account.status || 'unknown')}</div>
          </div>
          <div class="windows">
            ${windows.length ? windows.map(renderWindow).join('') : '<div class="empty">No quota windows in snapshot.</div>'}
          </div>
        </article>
      `;
    }

    function render(data) {
      const snapshot = normalizeSnapshot(data);
      const providers = Array.isArray(snapshot.providers) ? snapshot.providers : [];
      const accountCount = providers.reduce((sum, provider) => sum + (Array.isArray(provider.accounts) ? provider.accounts.length : 0), 0);
      metaEl.textContent = `Updated ${formatTime(snapshot.generated_at)}`;
      stateEl.textContent = `${providers.length} provider${providers.length === 1 ? '' : 's'} · ${accountCount} account${accountCount === 1 ? '' : 's'}`;

      if (!providers.length || !accountCount) {
        rootEl.innerHTML = '<div class="empty">No quota data published yet.</div>';
        return;
      }

      rootEl.innerHTML = providers.map((provider) => {
        const accounts = Array.isArray(provider.accounts) ? provider.accounts : [];
        return `
          <section class="provider">
            <div class="provider-head">
              <div class="provider-title">${escapeHtml(provider.title || provider.provider || 'Provider')}</div>
              <div class="pill">${accounts.length} account${accounts.length === 1 ? '' : 's'}</div>
            </div>
            <div class="accounts">${accounts.map(renderAccount).join('')}</div>
          </section>
        `;
      }).join('');
    }

    async function loadSnapshot() {
      let lastError;
      for (const url of snapshotUrls) {
        try {
          const response = await fetch(url, { cache: 'no-store' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error('snapshot unavailable');
    }

    loadSnapshot().then(render).catch(() => {
      metaEl.textContent = 'Snapshot unavailable';
      stateEl.textContent = 'offline';
      rootEl.innerHTML = '<div class="empty">Quota snapshot has not been published yet.</div>';
    });
  </script>
</body>
</html>
