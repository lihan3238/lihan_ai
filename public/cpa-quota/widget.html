<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Quota</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #18202f;
      --muted: #657186;
      --border: #d9dee8;
      --ok: #16835f;
      --warn: #b66a00;
      --bad: #b42318;
      --bar: #2f6fed;
      --bar-bg: #e7ebf2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    .shell {
      width: min(100%, 920px);
      margin: 0 auto;
      padding: 16px;
    }

    .topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 700;
    }

    .meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .pill {
      flex: 0 0 auto;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 9px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .account {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;
      margin-bottom: 12px;
    }

    .account-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .account-title {
      min-width: 0;
      font-size: 14px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .status {
      flex: 0 0 auto;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .status.available {
      color: var(--ok);
    }

    .status.limited {
      color: var(--bad);
    }

    .status.unknown {
      color: var(--warn);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }

    .window {
      min-height: 128px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfe;
    }

    .window-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
    }

    .percent {
      font-size: 20px;
      line-height: 1.2;
      font-weight: 800;
      margin-top: 8px;
    }

    .bar {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: var(--bar-bg);
      overflow: hidden;
      margin: 8px 0 10px;
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: var(--bar);
    }

    .details {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      background: var(--panel);
      font-size: 13px;
    }

    @media (max-width: 480px) {
      .shell {
        padding: 12px;
      }

      .topline,
      .account-head {
        align-items: stretch;
        flex-direction: column;
      }

      .pill,
      .status {
        align-self: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topline">
      <div>
        <h1>Codex quota</h1>
        <div class="meta" id="snapshot-meta">Loading snapshot...</div>
      </div>
      <div class="pill" id="snapshot-state">static snapshot</div>
    </div>
    <section id="accounts" class="empty">Loading quota snapshot...</section>
  </main>

  <script>
    const snapshotUrl = new URL('data/codex-quota.json', window.location.href);
    const accountsEl = document.getElementById('accounts');
    const metaEl = document.getElementById('snapshot-meta');
    const stateEl = document.getElementById('snapshot-state');

    function clampPercent(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return null;
      return Math.max(0, Math.min(100, number));
    }

    function formatPercent(value) {
      const number = clampPercent(value);
      if (number === null) return 'unknown';
      return `${number % 1 === 0 ? number.toFixed(0) : number.toFixed(1)}%`;
    }

    function formatTime(value) {
      if (!value) return 'unknown';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleString([], {
        month: 'short',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function secondsUntil(value, fallback) {
      if (value) {
        const date = new Date(value);
        if (!Number.isNaN(date.getTime())) {
          return Math.max(0, Math.floor((date.getTime() - Date.now()) / 1000));
        }
      }
      const seconds = Number(fallback);
      return Number.isFinite(seconds) ? Math.max(0, Math.floor(seconds)) : null;
    }

    function formatDuration(seconds) {
      if (seconds === null) return 'unknown';
      if (seconds <= 0) return 'now';
      const days = Math.floor(seconds / 86400);
      const hours = Math.floor((seconds % 86400) / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      if (days > 0) return `${days}d ${hours}h`;
      if (hours > 0) return `${hours}h ${minutes}m`;
      return `${minutes}m`;
    }

    function statusClass(value) {
      const status = String(value || 'unknown').toLowerCase();
      if (status === 'available') return 'available';
      if (status === 'limited') return 'limited';
      return 'unknown';
    }

    function detailLine(label, value) {
      return `<div><strong>${label}:</strong> ${value}</div>`;
    }

    function renderWindow(title, quota) {
      const windowData = quota || {};
      const percent = clampPercent(windowData.used_percent);
      const resetSeconds = secondsUntil(windowData.reset_at, windowData.reset_after_seconds);
      const usedLimit = Number.isFinite(Number(windowData.used)) && Number.isFinite(Number(windowData.limit))
        ? `${windowData.used} / ${windowData.limit}`
        : 'unknown';
      const width = percent === null ? 0 : percent;

      return `
        <article class="window">
          <div class="window-title">
            <span>${title}</span>
            <span class="status ${statusClass(windowData.status)}">${windowData.status || 'tracked'}</span>
          </div>
          <div class="percent">${formatPercent(windowData.used_percent)}</div>
          <div class="bar" aria-hidden="true"><span style="width: ${width}%"></span></div>
          <div class="details">
            ${detailLine('Used', usedLimit)}
            ${detailLine('Reset', formatTime(windowData.reset_at))}
            ${detailLine('Countdown', formatDuration(resetSeconds))}
          </div>
        </article>
      `;
    }

    function render(data) {
      const accounts = Array.isArray(data.accounts) ? data.accounts : [];
      metaEl.textContent = `Updated ${formatTime(data.generated_at)}`;
      stateEl.textContent = `${accounts.length || 0} account${accounts.length === 1 ? '' : 's'}`;

      if (accounts.length === 0) {
        accountsEl.className = 'empty';
        accountsEl.textContent = 'No quota data in snapshot.';
        return;
      }

      accountsEl.className = '';
      accountsEl.innerHTML = accounts.map((account) => {
        const windows = account.windows || {};
        const plan = account.plan_type ? ` · ${account.plan_type}` : '';
        return `
          <article class="account">
            <div class="account-head">
              <div class="account-title">${account.label || 'Codex'}${plan}</div>
              <div class="status ${statusClass(account.status)}">${account.status || 'unknown'}</div>
            </div>
            <div class="grid">
              ${renderWindow('5-hour', windows.five_hour)}
              ${renderWindow('Weekly', windows.weekly)}
            </div>
          </article>
        `;
      }).join('');
    }

    fetch(snapshotUrl, { cache: 'no-store' })
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then(render)
      .catch(() => {
        metaEl.textContent = 'Snapshot unavailable';
        stateEl.textContent = 'offline';
        accountsEl.className = 'empty';
        accountsEl.textContent = 'Quota snapshot has not been published yet.';
      });
  </script>
</body>
</html>
