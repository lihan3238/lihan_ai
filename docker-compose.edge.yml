services:
  caddy:
    image: caddy:2-alpine
    container_name: relay-edge-caddy
    restart: unless-stopped
    environment:
      EDGE_DOMAIN: ${EDGE_DOMAIN}
      ORIGIN_UPSTREAM: ${ORIGIN_UPSTREAM}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.edge.example:/etc/caddy/Caddyfile:ro
      - edge_caddy_data:/data
      - edge_caddy_config:/config
      - ./logs/edge-caddy:/var/log/caddy
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  edge_caddy_data:
  edge_caddy_config:
