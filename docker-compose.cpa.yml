services:
  cli-proxy-api:
    image: ${CLI_PROXY_IMAGE:-eceasy/cli-proxy-api:latest}
    container_name: relay-cpa
    restart: unless-stopped
    environment:
      DEPLOY: ${CPA_DEPLOY:-}
    volumes:
      - ${CPA_CONFIG_PATH:-/opt/lihan_ai_runtime/.cli-proxy-api/config.yaml}:/CLIProxyAPI/config.yaml:ro
      - ${CPA_AUTH_PATH:-/opt/lihan_ai_runtime/.cli-proxy-api}:/root/.cli-proxy-api
      - ${CPA_LOG_PATH:-./logs/cpa}:/CLIProxyAPI/logs
    networks:
      - relay-internal
