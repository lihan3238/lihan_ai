services:
  cli-proxy-api:
    image: ${CLI_PROXY_IMAGE:-eceasy/cli-proxy-api:latest}
    container_name: relay-cpa
    restart: unless-stopped
    environment:
      DEPLOY: ${CPA_DEPLOY:-}
    volumes:
      - ${CPA_CONFIG_PATH:-/opt/lihan_ai/data/cpa/config.yaml}:/CLIProxyAPI/config.yaml:ro
      - ${CPA_AUTH_PATH:-/opt/lihan_ai/data/cpa}:/root/.cli-proxy-api
      - ${CPA_LOG_PATH:-/opt/lihan_ai/logs/cpa}:/CLIProxyAPI/logs
    networks:
      - relay-internal
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  cpa-quota-static:
    image: caddy:2-alpine
    container_name: relay-cpa-quota-static
    restart: unless-stopped
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    volumes:
      - ./Caddyfile.cpa-quota:/etc/caddy/Caddyfile:ro
      - ./public/cpa-quota:/srv/cpa-quota:ro
      - ${CPA_PUBLIC_PATH:-/opt/lihan_ai/data/cpa/public}:/srv/cpa-quota/data:ro
    networks:
      - relay-internal
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
